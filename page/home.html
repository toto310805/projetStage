<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page de résultats</title>
    <link rel="stylesheet" href="/style/home.css">
</head>
<body>
    <h1>Consultez vos résultats !</h1>
    <button class="weatherButton">Météo</button>

    <img src="/lib/pictures/rocket.png" alt="Une fusée">

    <div class="resultsContainer">
        <div class="resultItem">
            <h2 class="dataTitle">Vélocité : </h2>
            <textarea readOnly class="data"></textarea>
        </div>
        <div class="resultItem">
            <h2 class="dataTitle">Altitude : </h2>
            <textarea readonly class="data"></textarea>
        </div>
        <div class="resultItem">
            <h2 class="dataTitle">Inclinaison : </h2>
            <textarea readonly class="data"></textarea>
        </div>
        <div class="resultItem">
            <h2 class="dataTitle">Accélération : </h2>
            <textarea readonly class="data"></textarea>
        </div>
        <div class="resultItem">
            <h2 class="dataTitle">Poussée : </h2>
            <textarea readonly class="data"></textarea>
        </div>
        <div class="resultItem">
            <h2 class="dataTitle">Température extérieure : </h2>
            <textarea readonly class="data"></textarea>
        </div>
    </div>


    <script src="/script/home.js"></script>
</body>
</html>
