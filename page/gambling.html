<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page détente</title>
    <link rel="stylesheet" href="/style/gambling.css">
</head>
<body>
    <h1>Il est temps de se détendre ! </h1>
    <button class="goBack">Retour</button>

    <p class="money">Porte-monnaie : <span id="value-money"></span></p>
    <p class="time">Argent gratuit dans : <span id="value-time"></span></p>

    <div class="slotMachine">
        <div class="reel" id="reel1"></div>
        <div class="reel" id="reel2"></div>
        <div class="reel" id="reel3"></div>
    </div>

    <p id="message"></p>


    <img src="/lib/pictures/spin.png" id="spinButton" onmouseenter="getsBiggerWhenAimed()" onmouseleave="getsSmallerWhenAimed()" onclick="spin()">
    <img src="/lib/pictures/dollars.png" id="dollars">
    <script src="/script/gambling.js"></script>
</body>
</html>
